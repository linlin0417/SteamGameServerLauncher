name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    if: "contains(github.event.head_commit.message, 'AndBuild')"
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Get Version from CMakeLists.txt
      id: get_version
      shell: pwsh
      run: |
        $cmake_content = Get-Content CMakeLists.txt -Raw
        if ($cmake_content -match 'project\([^)]+VERSION\s+([0-9.]+)') {
            $version = $matches[1]
            echo "VERSION=$version" >> $env:GITHUB_ENV
            echo "Extracted version: $version"
        } else {
            echo "VERSION=1.0.0" >> $env:GITHUB_ENV
            echo "Failed to extract version, using fallback 1.0.0"
        }

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.6.3'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'

    - name: Configure CMake
      run: >
        cmake -S . -B build
        -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release --parallel

    - name: Package (CPack - ZIP only)
      working-directory: build
      run: cpack -C Release -G "ZIP"

    - name: Install NSIS
      run: choco install nsis -y

    - name: Convert license Markdown to plain text
      shell: pwsh
      run: |
        $licenses = @(
            'EULA_zh', 'EULA_en',
            'QT_License_zh', 'QT_License_en',
            'Data_Collection_zh', 'Data_Collection_en'
        )
        $outDir = 'installer/licenses'
        foreach ($name in $licenses) {
            $mdPath = "installer/licenses/${name}.md"
            $txtPath = "installer/licenses/${name}.txt"
            if (-not (Test-Path $mdPath)) {
                Write-Error "[FAIL] License source not found: $mdPath"
                exit 1
            }
            $md = Get-Content $mdPath -Raw -Encoding UTF8
            # Markdown 清理：移除標題符號，移除粗體標記，保留內文
            $txt = $md -replace '(?m)^#{1,6}\s+', '' -replace '\*\*([^*]+)\*\*', '$1' -replace '__([^_]+)__', '$1'
            [System.IO.File]::WriteAllText(
                (Resolve-Path $txtPath -ErrorAction SilentlyContinue) ?? $txtPath,
                $txt,
                [System.Text.UTF8Encoding]::new($true)
            )
            Write-Output "[OK] Converted: $mdPath -> $txtPath"
        }

    - name: Prepare NSIS build output
      shell: pwsh
      run: |
        $buildOutputDir = 'installer/build_output'
        New-Item -ItemType Directory -Force -Path $buildOutputDir | Out-Null

        # 複製建置產出 (exe, dll, plugins 等)
        $releaseDir = 'build/Release'
        if (Test-Path $releaseDir) {
            Copy-Item -Path "$releaseDir/*" -Destination $buildOutputDir -Recurse -Force
        } else {
            # 某些 CMake generator 不建立 Release 子目錄
            Copy-Item -Path "build/SteamGameServerLauncher.exe" -Destination $buildOutputDir -Force
            Copy-Item -Path "build/Updater.exe" -Destination $buildOutputDir -Force
            Get-ChildItem -Path "build" -Filter "*.dll" | Copy-Item -Destination $buildOutputDir -Force
            if (Test-Path "build/platforms") {
                Copy-Item -Path "build/platforms" -Destination $buildOutputDir -Recurse -Force
            }
            if (Test-Path "build/styles") {
                Copy-Item -Path "build/styles" -Destination $buildOutputDir -Recurse -Force
            }
            if (Test-Path "build/tls") {
                Copy-Item -Path "build/tls" -Destination $buildOutputDir -Recurse -Force
            }
            if (Test-Path "build/networkinformation") {
                Copy-Item -Path "build/networkinformation" -Destination $buildOutputDir -Recurse -Force
            }
        }

        # 複製圖示
        Copy-Item -Path "src/UI/SGSL_icon.ico" -Destination $buildOutputDir -Force
        Write-Output "[OK] Build output prepared in: $buildOutputDir"
        Get-ChildItem $buildOutputDir | Format-Table Name, Length

    - name: Build NSIS installer
      shell: pwsh
      run: |
        $nsisScriptPath = 'installer/sgsl_installer.nsi'
        $nsisContent = Get-Content $nsisScriptPath -Raw -Encoding UTF8
        [System.IO.File]::WriteAllText((Resolve-Path $nsisScriptPath), $nsisContent, [System.Text.UTF8Encoding]::new($true))
        
        $nsisPath = 'C:\Program Files (x86)\NSIS\makensis.exe'
        if (-not (Test-Path $nsisPath)) {
            # 嘗試透過 PATH 尋找
            $nsisPath = 'makensis.exe'
        }
        & $nsisPath /DVERSION=${{ env.VERSION }} installer/sgsl_installer.nsi
        if ($LASTEXITCODE -ne 0) {
            Write-Error "[FAIL] NSIS build failed with exit code $LASTEXITCODE"
            exit 1
        }
        Write-Output "[OK] NSIS installer built successfully"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ env.VERSION }}
        name: Release v${{ env.VERSION }}
        body: "Automated release triggered by commit message containing 'AndBuild'."
        draft: false
        prerelease: false
        files: |
          installer/SteamGameServerLauncher-*.exe
          build/SteamGameServerLauncher-*.zip
